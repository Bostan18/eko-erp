<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EKO — Nouveau frontend (3 directions)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: {
              50:'#f0f7f3',100:'#dceee4',200:'#bbdccb',300:'#8dc3a9',400:'#5aa382',
              500:'#388562',600:'#276a4d',700:'#1a5c38',800:'#164a2e',900:'#123d26',950:'#0a2416',
            },
          },
          fontFamily: {
            display: ['Sora', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: #f6f7f8; }
    body { font-family: 'DM Sans', sans-serif; }
    /* For artboards, set explicit text base */
    .dc-artboard, [data-direction] { font-family: 'DM Sans', sans-serif; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="direction-a.jsx"></script>
  <script type="text/babel" src="direction-b.jsx"></script>
  <script type="text/babel" src="direction-c.jsx"></script>

  <script type="text/babel">
    const { DCSection, DCArtboard } = window;

    function App() {
      return (
        <window.DesignCanvas>
          {/* DIRECTION A */}
          <DCSection id="dir-a" title="A — Forest Classic" subtitle="Sidebar sombre forest-900 · modules groupés par domaine · mobile: drawer overlay · palette de marque actuelle">
            <DCArtboard id="a-desktop" label="Desktop · 1280" width={1280} height={800}>
              <window.DirA device="desktop" />
            </DCArtboard>
            <DCArtboard id="a-mobile" label="Mobile · 390" width={390} height={800}>
              <window.DirA device="mobile" />
            </DCArtboard>
          </DCSection>

          {/* DIRECTION B */}
          <DCSection id="dir-b" title="B — Modern · Charcoal" subtitle="Sidebar charcoal #212121 rétractable · barre de recherche en haut · boutons & SVG forest · mobile: bottom-nav">
            <DCArtboard id="b-desktop" label="Desktop · 1280" width={1280} height={800}>
              <window.DirB device="desktop" />
            </DCArtboard>
            <DCArtboard id="b-mobile" label="Mobile · 390" width={390} height={800}>
              <window.DirB device="mobile" />
            </DCArtboard>
          </DCSection>

          {/* DIRECTION C */}
          <DCSection id="dir-c" title="C — Compact Pro" subtitle="Rail icon-only 56px + panneau secondaire 240px · dense, power-user (Linear/Notion) · fond presque-noir · accent lime · mobile: bottom-nav">
            <DCArtboard id="c-desktop" label="Desktop · 1280" width={1280} height={800}>
              <window.DirC device="desktop" />
            </DCArtboard>
            <DCArtboard id="c-mobile" label="Mobile · 390" width={390} height={800}>
              <window.DirC device="mobile" />
            </DCArtboard>
          </DCSection>
        </window.DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
